<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M3 7v10a1 1 0 001 1h16a1 1 0 001-1V7M3 7V6a1 1 0 011-1h16a1 1 0 011 1v1m0 0H2"></path>
                </svg>
                Inventory Pro
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="create_product.html" class="nav-link">Add Product</a>
                <a href="get_products.html" class="nav-link active">Products</a>
                <a href="update_product.html" class="nav-link">Update</a>
                <a href="delete_product.html" class="nav-link">Remove</a>
                <a href="about.html" class="nav-link">About</a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1>Product Inventory</h1>
        <p>View and manage all your products</p>
    </div>

    <div class="container">
        <div class="table-container">
            <table id="productTable" class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Products will be loaded here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>No products found. <a href="create_product.html">Add your first product</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
